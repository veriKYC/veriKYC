version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: verikyc-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: verikyc
      POSTGRES_USER: verikyc_user
      POSTGRES_PASSWORD: verikyc_pass
    volumes:
      - verikyc-pgdata:/var/lib/postgresql/data

volumes:
  verikyc-pgdata: