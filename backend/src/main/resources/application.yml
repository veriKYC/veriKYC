spring:
  application:
    name: verikyc-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/verikyc}
    username: ${SPRING_DATASOURCE_USERNAME:verikyc_user}
    password: ${SPRING_DATASOURCE_PASSWORD:verikyc_pass}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080



